<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Usability Timer Tracker</title>
<style>
  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --border: #e2e0d8;
    --text: #1f1e1c;
    --text-secondary: #6b6a64;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
    --danger: #e24b4a;
    --danger-bg: #fcebeb;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .sub { font-size: 13px; color: var(--text-secondary); margin: 0 0 24px; }
  label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; }
  input[type="text"], textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--card);
    color: var(--text);
  }
  input[type="text"] { height: 40px; }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  button {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s, transform 0.05s;
    touch-action: manipulation;
  }
  button:hover { background: #f0efe9; }
  button:active { transform: scale(0.97); background: #e8e7e1; }
  button:disabled { opacity: 0.38; cursor: default; transform: none; }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    padding: 13px;
    font-size: 15px;
  }
  .btn-primary:hover { background: #134f8c; }
  .btn-primary:active { background: #0f3f70; }
  .btn-block { width: 100%; }
  .btn-danger-outline { color: var(--danger); border-color: #f5c6c6; background: #fff8f8; }
  .btn-danger-outline:hover { background: var(--danger-bg); }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 14px;
  }

  /* TOP ROW: task label + timer */
  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .task-label { font-size: 14px; font-weight: 600; }
  .timer-display {
    font-size: 24px;
    font-weight: 700;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    letter-spacing: 0.5px;
    color: var(--accent);
  }

  /* TIMER BUTTONS */
  .btn-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .btn-row button { flex: 1; font-size: 13px; padding: 10px 8px; }

  /* KLIK COUNTER — big tap target */
  .klik-section {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-bottom: 12px;
  }
  .klik-label {
    font-size: 13px;
    color: var(--text-secondary);
    flex-shrink: 0;
    width: 36px;
  }
  .klik-minus, .klik-plus {
    width: 52px;
    height: 52px;
    font-size: 24px;
    font-weight: 400;
    padding: 0;
    flex-shrink: 0;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .klik-plus {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-size: 28px;
    font-weight: 600;
    flex: 1;
    width: auto;
    height: 56px;
  }
  .klik-plus:hover { background: #134f8c; }
  .klik-plus:active { background: #0f3f70; transform: scale(0.97); }
  .klik-value {
    font-size: 22px;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  /* CATATAN */
  .catatan-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }

  /* SESSION HEADER */
  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .session-header .name { font-size: 18px; font-weight: 600; margin: 0; }
  .session-header .meta-label { font-size: 12px; color: var(--text-secondary); margin: 0 0 2px; }

  /* SUMMARY */
  .stat-box {
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  .stat-box .num { font-size: 28px; font-weight: 600; }
  .stat-box .lbl { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .hidden { display: none !important; }

  .footer-note {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 24px;
    line-height: 1.5;
  }
  .table-preview {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 12px;
  }
  .table-preview th, .table-preview td {
    border-bottom: 1px solid var(--border);
    padding: 6px 4px;
    text-align: left;
    vertical-align: top;
  }
  .table-preview th { color: var(--text-secondary); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Usability timer tracker</h1>
  <p class="sub">Pelacak waktu, klik, dan catatan kualitatif per task.</p>

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div style="margin-bottom:16px;">
      <label for="task-count-input">Jumlah task per responden</label>
      <input type="text" id="task-count-input" value="6" inputmode="numeric" />
    </div>
    <div style="margin-bottom:20px;">
      <label for="respondent-name">Nama / ID responden</label>
      <input type="text" id="respondent-name" placeholder="contoh: R01" />
    </div>
    <button class="btn-primary" id="start-session-btn">Mulai sesi testing</button>
    <div id="prior-data-note" class="footer-note hidden"></div>
  </div>

  <!-- SESSION SCREEN -->
  <div id="session-screen" class="hidden">
    <div class="session-header">
      <div>
        <p class="meta-label">Responden</p>
        <p class="name" id="session-name">R01</p>
      </div>
      <button class="btn-danger-outline" id="end-session-btn">Selesai responden</button>
    </div>
    <div id="task-list"></div>
  </div>

  <!-- EXPORT SCREEN -->
  <div id="export-screen" class="hidden">
    <div class="stat-box">
      <div class="num" id="respondent-count">0</div>
      <div class="lbl">responden tercatat</div>
    </div>
    <button class="btn-primary" id="export-btn">Export semua data (CSV)</button>
    <button class="btn-block" id="new-respondent-btn" style="margin-top:8px;">Tambah responden baru</button>
    <button class="btn-block btn-danger-outline" id="clear-all-btn" style="margin-top:8px;">Hapus semua data</button>
    <table class="table-preview" id="preview-table"></table>
  </div>

  <p class="footer-note">
    Data tersimpan lokal di browser ini (localStorage).<br>
    Export CSV secara berkala agar data tidak hilang.
  </p>
</div>

<script>
(function () {
  var STORAGE_KEY = 'usability_timer_sessions_v2';
  var DRAFT_KEY   = 'usability_timer_draft_v2';

  function loadSessions() {
    try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
    catch(e) { return []; }
  }
  function saveSessions(s) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
  }
  function saveDraft(c) {
    try { localStorage.setItem(DRAFT_KEY, JSON.stringify(c)); } catch(e) {}
  }
  function clearDraft() {
    try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
  }

  var sessions  = loadSessions();
  var current   = null;
  var taskCount = 6;

  function makeTask(i) {
    return { task: i+1, running:false, startTs:null, elapsedMs:0, clicks:0, catatan:'' };
  }
  function newSession(name, count) {
    var tasks = [];
    for (var i=0; i<count; i++) tasks.push(makeTask(i));
    return { name:name, tasks:tasks, createdAt: new Date().toISOString() };
  }

  function fmt(ms) {
    var s  = Math.floor(ms/1000);
    var m  = Math.floor(s/60);
    var ss = s % 60;
    var cs = Math.floor((ms%1000)/10);
    return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss+'.'+(cs<10?'0':'')+cs;
  }

  /* ── RENDER ── */
  function renderTasks() {
    var list = document.getElementById('task-list');
    list.innerHTML = '';

    current.tasks.forEach(function(t, idx) {

      /* timer display */
      var timeEl = document.createElement('span');
      timeEl.className = 'timer-display';
      timeEl.id = 'time-' + idx;
      timeEl.textContent = fmt(t.elapsedMs);

      var topRow = document.createElement('div');
      topRow.className = 'task-top';
      var lbl = document.createElement('span');
      lbl.className = 'task-label';
      lbl.textContent = 'Task ' + t.task;
      topRow.appendChild(lbl);
      topRow.appendChild(timeEl);

      /* mulai button */
      var startBtn = document.createElement('button');
      startBtn.textContent = t.running ? 'Berjalan…' : (t.elapsedMs > 0 ? 'Lanjut' : 'Mulai');
      startBtn.disabled = t.running;
      startBtn.addEventListener('click', function() {
        if (t.running) return;
        t.running = true;
        t.startTs = Date.now() - t.elapsedMs;
        saveDraft(current);
        startBtn.textContent = 'Berjalan…';
        startBtn.disabled = true;
        stopBtn.disabled  = false;
      });

      /* stop button */
      var stopBtn = document.createElement('button');
      stopBtn.textContent = 'Stop';
      stopBtn.disabled = !t.running;
      stopBtn.addEventListener('click', function() {
        if (!t.running) return;
        t.elapsedMs = Date.now() - t.startTs;
        t.running   = false;
        saveDraft(current);
        timeEl.textContent    = fmt(t.elapsedMs);
        startBtn.textContent  = 'Lanjut';
        startBtn.disabled     = false;
        stopBtn.disabled      = true;
      });

      /* reset button */
      var resetBtn = document.createElement('button');
      resetBtn.textContent = '↺';
      resetBtn.setAttribute('aria-label', 'Reset task ' + t.task);
      resetBtn.addEventListener('click', function() {
        t.running   = false;
        t.elapsedMs = 0;
        t.startTs   = null;
        saveDraft(current);
        timeEl.textContent   = fmt(0);
        startBtn.textContent = 'Mulai';
        startBtn.disabled    = false;
        stopBtn.disabled     = true;
      });

      var btnRow = document.createElement('div');
      btnRow.className = 'btn-row';
      btnRow.appendChild(startBtn);
      btnRow.appendChild(stopBtn);
      btnRow.appendChild(resetBtn);

      /* ── KLIK COUNTER (big tap) ── */
      var klikLabel = document.createElement('span');
      klikLabel.className = 'klik-label';
      klikLabel.textContent = 'Klik';

      var klikVal = document.createElement('span');
      klikVal.className = 'klik-value';
      klikVal.textContent = t.clicks;

      var minusBtn = document.createElement('button');
      minusBtn.className = 'klik-minus';
      minusBtn.textContent = '–';
      minusBtn.setAttribute('aria-label', 'Kurangi klik task ' + t.task);
      minusBtn.addEventListener('click', function() {
        t.clicks = Math.max(0, t.clicks - 1);
        klikVal.textContent = t.clicks;
        saveDraft(current);
      });

      var plusBtn = document.createElement('button');
      plusBtn.className = 'klik-plus';
      plusBtn.textContent = '+';
      plusBtn.setAttribute('aria-label', 'Tambah klik task ' + t.task);
      plusBtn.addEventListener('click', function() {
        t.clicks++;
        klikVal.textContent = t.clicks;
        saveDraft(current);
      });

      var klikSection = document.createElement('div');
      klikSection.className = 'klik-section';
      klikSection.appendChild(klikLabel);
      klikSection.appendChild(minusBtn);
      klikSection.appendChild(klikVal);
      klikSection.appendChild(plusBtn);

      /* ── CATATAN KUALITATIF ── */
      var catatanLbl = document.createElement('p');
      catatanLbl.className = 'catatan-label';
      catatanLbl.textContent = 'Catatan';

      var catatanArea = document.createElement('textarea');
      catatanArea.placeholder = 'Tulis observasi, kebingungan, komentar responden…';
      catatanArea.value = t.catatan || '';
      catatanArea.addEventListener('input', function() {
        t.catatan = catatanArea.value;
        saveDraft(current);
      });

      /* assemble card */
      var card = document.createElement('div');
      card.className = 'card';
      card.appendChild(topRow);
      card.appendChild(btnRow);
      card.appendChild(klikSection);
      card.appendChild(catatanLbl);
      card.appendChild(catatanArea);
      list.appendChild(card);
    });
  }

  /* live timer tick */
  setInterval(function() {
    if (!current) return;
    current.tasks.forEach(function(t, idx) {
      if (t.running) {
        var el = document.getElementById('time-' + idx);
        if (el) el.textContent = fmt(Date.now() - t.startTs);
      }
    });
  }, 100);

  /* ── SCREENS ── */
  function showScreen(id) {
    ['setup-screen','session-screen','export-screen'].forEach(function(s) {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  function renderExportScreen() {
    document.getElementById('respondent-count').textContent = sessions.length;
    var table = document.getElementById('preview-table');
    if (!sessions.length) { table.innerHTML = ''; return; }
    var rows = '<tr><th>Responden</th><th>Task</th><th>Waktu</th><th>Klik</th><th>Catatan</th></tr>';
    sessions.forEach(function(s) {
      s.tasks.forEach(function(t) {
        rows += '<tr><td>' + esc(s.name) + '</td><td>' + t.task + '</td><td>' +
                fmt(t.elapsedMs) + '</td><td>' + t.clicks + '</td><td>' +
                esc(t.catatan || '') + '</td></tr>';
      });
    });
    table.innerHTML = rows;
  }

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ── EVENTS ── */
  document.getElementById('start-session-btn').addEventListener('click', function() {
    var c = parseInt(document.getElementById('task-count-input').value, 10);
    taskCount = (isFinite(c) && c > 0) ? c : 6;
    var name = document.getElementById('respondent-name').value.trim() ||
               ('R' + String(sessions.length + 1).padStart(2, '0'));
    current = newSession(name, taskCount);
    saveDraft(current);
    document.getElementById('session-name').textContent = name;
    showScreen('session-screen');
    renderTasks();
  });

  document.getElementById('end-session-btn').addEventListener('click', function() {
    if (!current) return;
    current.tasks.forEach(function(t) {
      if (t.running) { t.elapsedMs = Date.now() - t.startTs; t.running = false; }
    });
    sessions.push(current);
    saveSessions(sessions);
    clearDraft();
    current = null;
    showScreen('export-screen');
    renderExportScreen();
  });

  document.getElementById('new-respondent-btn').addEventListener('click', function() {
    document.getElementById('respondent-name').value = '';
    showScreen('setup-screen');
  });

  document.getElementById('clear-all-btn').addEventListener('click', function() {
    if (!confirm('Hapus semua data? Tindakan ini tidak bisa dibatalkan.')) return;
    sessions = [];
    saveSessions(sessions);
    clearDraft();
    renderExportScreen();
  });

  document.getElementById('export-btn').addEventListener('click', function() {
    var header = ['Responden','Task','Waktu (mm:ss.cs)','Waktu (detik)','Klik','Catatan'];
    var rows = [header];
    sessions.forEach(function(s) {
      s.tasks.forEach(function(t) {
        rows.push([s.name, t.task, fmt(t.elapsedMs), (t.elapsedMs/1000).toFixed(2),
                   t.clicks, t.catatan || '']);
      });
    });
    var csv = rows.map(function(r) {
      return r.map(function(v) {
        var str = String(v);
        if (str.search(/[,"\n]/) !== -1) str = '"' + str.replace(/"/g, '""') + '"';
        return str;
      }).join(',');
    }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href   = url;
    a.download = 'usability_results_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  /* ── DRAFT RECOVERY ── */
  (function() {
    try {
      var raw = localStorage.getItem(DRAFT_KEY);
      if (raw) {
        var draft = JSON.parse(raw);
        if (draft && draft.tasks && draft.tasks.length) {
          var note = document.getElementById('prior-data-note');
          note.classList.remove('hidden');
          note.textContent = 'Memulihkan sesi responden "' + draft.name + '" yang belum selesai.';
          current = draft;
          taskCount = draft.tasks.length;
          document.getElementById('session-name').textContent = draft.name;
          showScreen('session-screen');
          renderTasks();
          return;
        }
      }
    } catch(e) {}
    if (sessions.length > 0) { showScreen('export-screen'); renderExportScreen(); }
    else { showScreen('setup-screen'); }
  })();
})();
</script>
</body>
</html>
